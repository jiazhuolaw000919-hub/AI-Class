<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Law AI Academy</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/academy.css">
  <link rel="stylesheet" href="css/animation.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/learning.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/theme.css">

  <!-- ========================= -->
  <!-- 核心 JS -->
  <!-- ========================= -->
  
  <!-- 1. 核心启动引导器 -->
  <script>
    window.LawAIApp = window.LawAIApp || {};
    
    // StorageEngine 占位
    LawAIApp.StorageEngine = {
      _placeholder: true,
      get: function(key, defaultValue) { 
        try { var val = localStorage.getItem('lawai_' + key); return val ? JSON.parse(val) : defaultValue; } 
        catch(e) { return defaultValue; }
      },
      set: function(key, value) { 
        try { localStorage.setItem('lawai_' + key, JSON.stringify(value)); return true; } 
        catch(e) { return false; }
      },
      init: function() { console.log('💾 StorageEngine ready'); return this; }
    };
    
    // EventBus 占位
    LawAIApp.EventBus = {
      _placeholder: true,
      emit: function(event, data) { 
        try { window.dispatchEvent(new CustomEvent(event, { detail: data })); } 
        catch(e) {}
        return true;
      },
      on: function(event, callback) { 
        try { window.addEventListener(event, function(e) { callback(e.detail); }); } 
        catch(e) {}
        return true;
      }
    };
    
    console.log('✅ Core placeholders created');
  </script>
  
  <!-- 2. ProgressEngine -->
  <script src="js/progressEngine.js"></script>
  
  <!-- 3. SystemComposer -->
  <script src="js/systemComposer.js"></script>
  
  <!-- 4. App -->
  <script src="js/app.js"></script>

  <!-- ===== Phase 1: UI 组件 ===== -->
  <script src="js/ui/toastSystem.js"></script>
  <script src="js/ui/emptyStates.js"></script>

  <!-- 5. 启动脚本 -->
  <script>
    console.log('🚀 Starting application...');
    
    // 初始化 ProgressEngine
    if (LawAIApp.ProgressEngine && typeof LawAIApp.ProgressEngine.init === 'function') {
      LawAIApp.ProgressEngine.init();
    }
    
    // 初始化 SystemComposer
    setTimeout(function() {
      if (LawAIApp.SystemComposer && typeof LawAIApp.SystemComposer.init === 'function') {
        LawAIApp.SystemComposer.init({});
        console.log('✅ SystemComposer initialized');
      }
    }, 500);
    
    // 加载 academy 页面作为 Dashboard
    function loadAcademyPage() {
      console.log('📄 Loading academy page...');
      
      fetch('pages/academy.html')
        .then(function(response) {
          if (!response.ok) throw new Error('Failed to load: ' + response.status);
          return response.text();
        })
        .then(function(html) {
          var parser = new DOMParser();
          var doc = parser.parseFromString(html, 'text/html');
          var bodyContent = doc.body.innerHTML;
          
          var root = document.getElementById('law-runtime-root');
          if (root) {
            var container = document.getElementById('systemComposerRoot');
            if (!container) {
              container = document.createElement('div');
              container.id = 'systemComposerRoot';
              root.appendChild(container);
            }
            container.innerHTML = bodyContent;
            console.log('✅ Academy page loaded as Dashboard!');
          }
        })
        .catch(function(err) {
          console.warn('⚠️ Failed to load academy page:', err.message);
          // 如果加载失败，显示 SystemComposer 默认界面
          if (LawAIApp.SystemComposer && typeof LawAIApp.SystemComposer._renderMainUI === 'function') {
            LawAIApp.SystemComposer._renderMainUI();
          }
        });
    }
    
    // 等待 SystemComposer 就绪后加载页面
    document.addEventListener('COMPOSER_MOUNTED', function() {
      console.log('📡 COMPOSER_MOUNTED received, loading academy page...');
      setTimeout(loadAcademyPage, 300);
    });
    
    // 备用：5秒后强制加载
    setTimeout(function() {
      var root = document.getElementById('law-runtime-root');
      if (root && root.innerHTML.trim() === '') {
        console.warn('⚠️ Fallback: forcing academy page load...');
        loadAcademyPage();
      }
    }, 5000);
  </script>

</head>
<body>
  <div id="law-runtime-root"></div>

  <!-- 加载提示 -->
  <div id="loading-placeholder" style="
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #0b1220;
    color: #94a3b8;
    font-family: 'Inter', -apple-system, sans-serif;
    text-align: center;
    padding: 20px;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 9999;
    pointer-events: none;
    transition: opacity 0.8s ease;
  ">
    <div style="font-size: 48px; margin-bottom: 16px;">🚀</div>
    <h2 style="color: white; font-weight: 600; margin: 0 0 8px 0;">Loading Law AI Academy</h2>
    <p style="margin: 0; font-size: 14px;">Preparing your learning environment...</p>
    <div style="margin-top: 24px; width: 40px; height: 40px; border: 3px solid rgba(74,158,255,0.15); border-top-color: #4a9eff; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
  </div>

  <script>
    document.addEventListener('COMPOSER_MOUNTED', function() {
      var el = document.getElementById('loading-placeholder');
      if (el) { el.style.opacity = '0'; setTimeout(function() { el.style.display = 'none'; }, 800); }
    });
    setTimeout(function() {
      var el = document.getElementById('loading-placeholder');
      if (el && el.style.display !== 'none') { el.style.opacity = '0'; setTimeout(function() { el.style.display = 'none'; }, 800); }
    }, 5000);
  </script>
</body>
</html>
