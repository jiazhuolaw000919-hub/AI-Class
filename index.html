<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Law AI Academy</title>

  <!-- 使用相对路径（不依赖根路径） -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/academy.css">
  <link rel="stylesheet" href="css/animation.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/learning.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/theme.css">

  <!-- ========================= -->
  <!-- 加载 JS -->
  <!-- ========================= -->
  
  <!-- 1. Loader（核心加载器） -->
  <script src="js/loader.js"></script>
  
  <!-- 2. 课程引擎 -->
  <script src="js/lessonEngine.js"></script>
  
  <!-- 3. UI 组件 -->
  <script src="js/ui/toastSystem.js"></script>
  <script src="js/ui/emptyStates.js"></script>

  <!-- 4. Civilization 引擎（多学院架构） -->
  <script src="js/schoolEngine.js"></script>
  <script src="js/academicRecordEngine.js"></script>
  <script src="js/certificateEngine.js"></script>
  <script src="js/careerEngine.js"></script>
  <script src="js/communityEngine.js"></script>

  <!-- ========================================================== -->
  <!-- 5. 🛠️ DevTools（Ctrl+Shift+L 打开性能覆盖层）             -->
  <!-- ========================================================== -->
  <script src="js/dev/runtimeProfiler.js"></script>
  <script src="js/dev/performanceCollector.js"></script>
  <script src="js/dev/runtimeReport.js"></script>
  <script src="js/dev/developerOverlay.js"></script>

  <!-- 6. 启动脚本 (Part 45.9.1 Fixed — Auto BootManager.start()) -->
  <script>
    console.log('🚀 Starting Law AI Academy...');
    
    function initApp() {
      console.log('✅ System ready, initializing App...');

      // ────────────────────────────────────────────────
      // 🔥 Part 45.9.1 Fix: Auto-trigger BootManager
      //    Checks _booted to prevent double boot.
      // ────────────────────────────────────────────────
      var bm = (window.LawAIApp && LawAIApp.BootManager) || window.bootManager;
      if (bm && typeof bm.start === 'function' && !bm._booted) {
        console.log('🔥 Auto-starting BootManager...');
        bm.start();
      } else if (bm && bm._booted) {
        console.log('✅ BootManager already booted, skipping');
      } else {
        console.warn('⚠️ BootManager not available for auto-start');
      }
      
      // ── SystemComposer ──
      if (window.LawAIApp && window.LawAIApp.SystemComposer) {
        try {
          window.LawAIApp.SystemComposer.init({});
        } catch (err) {
          console.warn('⚠️ SystemComposer init error:', err);
        }
      } else {
        console.warn('⚠️ SystemComposer not found, retrying...');
        setTimeout(initApp, 500);
        return;
      }

      // ── DevPanel refresh after boot pipeline completes ──
      setTimeout(function() {
        if (LawAIApp.Debug && LawAIApp.Debug.DevPanel && typeof LawAIApp.Debug.DevPanel.refresh === 'function') {
          LawAIApp.Debug.DevPanel.refresh();
        }
      }, 300);
      
      // ── Loading placeholder fade ──
      setTimeout(function() {
        var el = document.getElementById('loading-placeholder');
        if (el) {
          el.style.opacity = '0';
          setTimeout(function() {
            el.style.display = 'none';
          }, 800);
        }
      }, 500);
    }

    document.addEventListener('SYSTEM_READY', function(e) {
      console.log('📡 SYSTEM_READY received');
      initApp();
    });

    // Fallback: if SYSTEM_READY never fires, force init after 5s
    setTimeout(function() {
      var root = document.getElementById('law-runtime-root');
      if (root && root.innerHTML.trim() === '') {
        console.warn('⚠️ Fallback: forcing init...');
        initApp();
      }
    }, 5000);

    // Ultimate fallback: hide loading placeholder after 7s no matter what
    setTimeout(function() {
      var el = document.getElementById('loading-placeholder');
      if (el && el.style.display !== 'none') {
        el.style.opacity = '0';
        setTimeout(function() {
          el.style.display = 'none';
        }, 800);
      }
    }, 7000);
  </script>

</head>
<body>
  <div id="law-runtime-root"></div>

  <!-- 加载提示 -->
  <div id="loading-placeholder" style="
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #0b1220;
    color: #94a3b8;
    font-family: 'Inter', -apple-system, sans-serif;
    text-align: center;
    padding: 20px;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 9999;
    pointer-events: none;
    transition: opacity 0.8s ease;
  ">
    <div style="font-size: 48px; margin-bottom: 16px;">🚀</div>
    <h2 style="color: white; font-weight: 600; margin: 0 0 8px 0;">Loading Law AI Academy</h2>
    <p style="margin: 0; font-size: 14px;">Preparing your learning environment...</p>
    <div style="margin-top: 24px; width: 40px; height: 40px; border: 3px solid rgba(74,158,255,0.15); border-top-color: #4a9eff; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
  </div>

  <noscript>
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#0b1220;color:white;text-align:center;padding:20px;">
      <h2>⚠️ JavaScript 未启用</h2>
      <p style="color:#94a3b8;">请启用 JavaScript 以使用 Law AI Academy</p>
    </div>
  </noscript>
</body>
</html>
