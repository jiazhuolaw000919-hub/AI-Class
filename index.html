<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Law AI Academy</title>

  <!-- ========================= -->
  <!-- 加载所有 CSS -->
  <!-- ========================= -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/academy.css">
  <link rel="stylesheet" href="css/animation.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/learning.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/lesson.css">
  <link rel="stylesheet" href="css/notes.css">
  <link rel="stylesheet" href="css/calendar.css">
  <link rel="stylesheet" href="css/settings.css">

  <!-- ========================= -->
  <!-- 加载 JS（按顺序：核心启动器 → 核心引擎 → 系统组件） -->
  <!-- ========================= -->
  
  <!-- 1. 加载器 -->
  <script src="js/loader.js"></script>
  
  <!-- 2. 核心启动引导器（新增 - 管理依赖顺序） -->
  <script src="js/coreBootstrap.js"></script>
  
  <!-- 3. 核心引擎（按依赖顺序） -->
  <script src="js/storageEngine.js"></script>
  <script src="js/progressEngine.js"></script>
  <script src="js/systemHealthMonitor.js"></script>
  <script src="js/systemAnalyzer.js"></script>
  <script src="js/selfImprovementEngine.js"></script>
  <script src="js/evolutionDriveEngine.js"></script>
  
  <!-- 4. 系统组件 -->
  <script src="js/systemComposer.js"></script>
  <script src="js/app.js"></script>

  <!-- 5. 启动脚本 -->
  <script>
    // 监听 CoreBootstrap 就绪事件
    document.addEventListener('CORE_BOOTSTRAP_READY', function() {
      console.log('📡 CoreBootstrap ready, initializing SystemComposer...');
      
      // 初始化 SystemComposer
      if (window.LawAIApp?.SystemComposer) {
        window.LawAIApp.SystemComposer.init({});
      } else {
        console.warn('⚠️ SystemComposer not found after bootstrap');
      }
      
      // 加载 academy 页面
      loadAcademyPage();
    });

    // 备用启动：如果 CoreBootstrap 没触发，5秒后手动启动
    setTimeout(function() {
      if (!window._bootstrapped) {
        console.warn('⚠️ CoreBootstrap not triggered, manual fallback...');
        
        // 手动初始化核心模块
        try {
          if (LawAIApp.StorageEngine && typeof LawAIApp.StorageEngine.init === 'function') {
            LawAIApp.StorageEngine.init();
          }
          if (LawAIApp.ProgressEngine && typeof LawAIApp.ProgressEngine.init === 'function') {
            LawAIApp.ProgressEngine.init();
          }
          if (LawAIApp.SystemHealthMonitor && typeof LawAIApp.SystemHealthMonitor.init === 'function') {
            LawAIApp.SystemHealthMonitor.init();
          }
          if (LawAIApp.SystemAnalyzer && typeof LawAIApp.SystemAnalyzer.init === 'function') {
            LawAIApp.SystemAnalyzer.init();
          }
        } catch (err) {
          console.warn('⚠️ Manual init failed:', err);
        }
        
        // 初始化 SystemComposer
        if (window.LawAIApp?.SystemComposer) {
          window.LawAIApp.SystemComposer.init({});
        }
        
        // 加载 academy 页面
        loadAcademyPage();
      }
    }, 5000);

    function loadAcademyPage() {
      console.log('📄 Loading academy page...');
      
      // 使用 fetch 加载 academy.html 的内容
      fetch('pages/academy.html')
        .then(function(response) {
          if (!response.ok) {
            throw new Error('Failed to load academy page: ' + response.status);
          }
          return response.text();
        })
        .then(function(html) {
          // 提取 body 内容
          var parser = new DOMParser();
          var doc = parser.parseFromString(html, 'text/html');
          
          // 获取 body 内的内容
          var bodyContent = doc.body.innerHTML;
          
          // 找到挂载点
          var root = document.getElementById('law-runtime-root');
          if (root) {
            // 保留原有的 systemComposerRoot 作为容器
            var container = document.getElementById('systemComposerRoot');
            if (!container) {
              container = document.createElement('div');
              container.id = 'systemComposerRoot';
              root.appendChild(container);
            }
            
            // 将 academy 内容放入容器
            container.innerHTML = bodyContent;
            
            console.log('✅ Academy page loaded successfully!');
            window._academyLoaded = true;
          }
        })
        .catch(function(err) {
          console.warn('⚠️ Failed to load academy page, using fallback:', err.message);
          // 如果加载失败，使用 SystemComposer 的默认渲染
          if (window.LawAIApp?.SystemComposer) {
            window.LawAIApp.SystemComposer._renderMainUI();
          }
        });
    }

    // 标记启动完成
    window._bootstrapped = true;
  </script>

</head>
<body>
  <!-- 挂载点 -->
  <div id="law-runtime-root"></div>

  <!-- 加载提示 -->
  <div id="loading-placeholder" style="
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #0b1220;
    color: #94a3b8;
    font-family: 'Inter', -apple-system, sans-serif;
    text-align: center;
    padding: 20px;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 9999;
    pointer-events: none;
    transition: opacity 0.8s ease;
  ">
    <div style="font-size: 48px; margin-bottom: 16px;">🚀</div>
    <h2 style="color: white; font-weight: 600; margin: 0 0 8px 0;">Loading Law AI Academy</h2>
    <p style="margin: 0; font-size: 14px;">Preparing your learning environment...</p>
    <div style="
      margin-top: 24px;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(74,158,255,0.15);
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    "></div>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </div>

  <script>
    // 当页面加载完成后，隐藏 loading 占位
    document.addEventListener('COMPOSER_MOUNTED', function() {
      hideLoading();
    });
    
    // 备用：5秒后隐藏
    setTimeout(hideLoading, 5000);
    
    function hideLoading() {
      var placeholder = document.getElementById('loading-placeholder');
      if (placeholder) {
        placeholder.style.opacity = '0';
        setTimeout(function() {
          placeholder.style.display = 'none';
        }, 800);
      }
    }
  </script>

  <!-- 如果 JavaScript 被禁用 -->
  <noscript>
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#0b1220;color:white;text-align:center;padding:20px;">
      <h2>⚠️ JavaScript 未启用</h2>
      <p style="color:#94a3b8;">请启用 JavaScript 以使用 Law AI Academy</p>
    </div>
  </noscript>
</body>
</html>
