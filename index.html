<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Law AI Academy</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/academy.css">
  <link rel="stylesheet" href="css/animation.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/learning.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/theme.css">

  <!-- ========================= -->
  <!-- 加载 JS -->
  <!-- ========================= -->
  
  <!-- 1. Loader（核心加载器） -->
  <script src="js/loader.js"></script>
  
  <!-- 2. UI 组件 -->
  <script src="js/ui/toastSystem.js"></script>
  <script src="js/ui/emptyStates.js"></script>

  <!-- ============================================================ -->
  <!-- 3. 核心引擎（按依赖顺序加载）                                  -->
  <!-- ============================================================ -->
  <script src="js/storageEngine.js"></script>
  <script src="js/eventBus.js"></script>
  <script src="js/profileEngine.js"></script>
  <script src="js/progressEngine.js"></script>
  <script src="js/systemComposer.js"></script>
  
  <!-- 👇 新增 Academy 视图（修复 Academy 页面空白） -->
  <script src="js/academyAIView.js"></script>
  
  <!-- 4. 应用主入口 -->
  <script src="js/app.js"></script>

  <!-- 5. 启动脚本（修复版） -->
  <script>
    console.log('🚀 Starting Law AI Academy...');
    
    // 等待 loader 完成
    function initApp() {
      console.log('✅ System ready, initializing App...');
      
      // 检查 SystemComposer 是否存在（不用可选链）
      if (window.LawAIApp && window.LawAIApp.SystemComposer) {
        try {
          window.LawAIApp.SystemComposer.init({});
        } catch (err) {
          console.warn('⚠️ SystemComposer init error:', err);
        }
      } else {
        console.warn('⚠️ SystemComposer not found, retrying...');
        setTimeout(initApp, 500);
        return;
      }
      
      // 隐藏加载提示
      setTimeout(function() {
        var el = document.getElementById('loading-placeholder');
        if (el) {
          el.style.opacity = '0';
          setTimeout(function() {
            el.style.display = 'none';
          }, 800);
        }
      }, 500);
    }

    // 监听系统就绪事件
    document.addEventListener('SYSTEM_READY', function(e) {
      console.log('📡 SYSTEM_READY received');
      initApp();
    });

    // 备用：如果 SYSTEM_READY 没触发，5秒后强制初始化
    setTimeout(function() {
      var root = document.getElementById('law-runtime-root');
      if (root && root.innerHTML.trim() === '') {
        console.warn('⚠️ Fallback: forcing init...');
        initApp();
      }
    }, 5000);

    // 强制隐藏加载（7秒后无论如何都隐藏）
    setTimeout(function() {
      var el = document.getElementById('loading-placeholder');
      if (el && el.style.display !== 'none') {
        el.style.opacity = '0';
        setTimeout(function() {
          el.style.display = 'none';
        }, 800);
      }
    }, 7000);
  </script>

</head>
<body>
  <div id="law-runtime-root"></div>

  <!-- 加载提示 -->
  <div id="loading-placeholder" style="
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #0b1220;
    color: #94a3b8;
    font-family: 'Inter', -apple-system, sans-serif;
    text-align: center;
    padding: 20px;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 9999;
    pointer-events: none;
    transition: opacity 0.8s ease;
  ">
    <div style="font-size: 48px; margin-bottom: 16px;">🚀</div>
    <h2 style="color: white; font-weight: 600; margin: 0 0 8px 0;">Loading Law AI Academy</h2>
    <p style="margin: 0; font-size: 14px;">Preparing your learning environment...</p>
    <div style="margin-top: 24px; width: 40px; height: 40px; border: 3px solid rgba(74,158,255,0.15); border-top-color: #4a9eff; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
  </div>

  <noscript>
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#0b1220;color:white;text-align:center;padding:20px;">
      <h2>⚠️ JavaScript 未启用</h2>
      <p style="color:#94a3b8;">请启用 JavaScript 以使用 Law AI Academy</p>
    </div>
  </noscript>
</body>
</html>
