    (async function() {
      window.LawAIApp = window.LawAIApp || {};
      if (!LawAIApp.ContentLoader) return;
      let pack = await LawAIApp.ContentLoader.fetchPack('academy_ai');
      if (!pack) {
        LawAIApp.ContentLoader.installDefaultAIPack();
        pack = LawAIApp.ContentLoader.loadFromLocalStorage('academy_ai');
      }
      if (pack) {
        const errors = LawAIApp.ContentLoader.validatePack(pack);
        if (errors.length > 0) {
          console.warn('Pack validation errors:', errors);
        } else {
          console.log('✅ AI Learning Pack loaded successfully.');
        }
      } else {
        console.warn('⚠️ Could not load AI Learning Pack.');
      }
    })();
