<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Law AI Academy</title>

  <!-- ========== Phase 1 样式 ========== -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/learning.css">
  <link rel="stylesheet" href="css/calendar.css">
  <link rel="stylesheet" href="css/notes.css">
  <link rel="stylesheet" href="css/settings.css">

  <!-- ========== Phase 3 样式 ========== -->
  <link rel="stylesheet" href="css/lesson.css">

  <!-- ========== Phase 5 样式 ========== -->
  <link rel="stylesheet" href="css/academy.css">
</head>
<body>
  <div id="app" class="app-container"></div>

  <!-- ========== 底部导航栏 ========== -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-page="dashboard">📊 Dashboard</button>
    <button class="nav-item" data-page="learning">📚 Learning</button>
    <button class="nav-item" data-page="calendar">📅 Calendar</button>
    <button class="nav-item" data-page="notes">📝 Notes</button>
    <button class="nav-item" data-page="settings">⚙️ Settings</button>
  </nav>

  <!-- ========== 页面模板（离线可用） ========== -->
  <div style="display:none" id="templates">
    <template id="template-dashboard"></template>
    <template id="template-learning"></template>
    <template id="template-calendar"></template>
    <template id="template-notes"></template>
    <template id="template-tools"></template>
    <template id="template-prompt"></template>
    <template id="template-settings"></template>

    <!-- Phase 3 新增：Lesson 页面模板 -->
    <template id="template-lesson">
      <div class="lesson-page" id="lesson-dynamic-content"></div>
    </template>

    <!-- Phase 5 新增：Academy 页面模板 -->
    <template id="template-academy">
      <div class="academy-page" id="academy-content"></div>
    </template>
  </div>

  <!-- ========== Phase 1 基础脚本 ========== -->
  <script src="js/storage.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/theme.js"></script>

  <!-- ========== Phase 2 引擎脚本 ========== -->
  <script src="js/storageEngine.js"></script>
  <script src="js/lessonEngine.js"></script>
  <script src="js/streakEngine.js"></script>
  <script src="js/levelEngine.js"></script>
  <script src="js/progressEngine.js"></script>
  <script src="js/achievementEngine.js"></script>
  <script src="js/searchEngine.js"></script>

  <!-- ========== Phase 4 新增引擎 ========== -->
  <script src="js/bookmark.js"></script>
  <script src="js/reviewQueue.js"></script>
  <script src="js/secondBrain.js"></script>
  <script src="js/heatmap.js"></script>
  <script src="js/statistics.js"></script>
  <script src="js/history.js"></script>
  <script src="js/timeline.js"></script>
  <script src="js/calendarEngine.js"></script>

  <!-- ========== Phase 6 Academy Object 引擎 ========== -->
  <!-- 顺序重要：Model → Data → Storage -->
  <script src="js/academyModel.js"></script>
  <script src="js/academyData.js"></script>
  <script src="js/academyStorage.js"></script>

  <!-- ========== Phase 7 Category Object 引擎 ========== -->
  <script src="js/categoryModel.js"></script>
  <script src="js/categoryData.js"></script>
  <script src="js/categoryStorage.js"></script>

  <!-- ========== Phase 8 Course Object 引擎 ========== -->
  <script src="js/courseModel.js"></script>
  <script src="js/courseData.js"></script>
  <script src="js/courseStorage.js"></script>

  <!-- ========== Phase 9 Module Object 引擎 ========== -->
  <script src="js/moduleModel.js"></script>
  <script src="js/moduleData.js"></script>
  <script src="js/moduleStorage.js"></script>

  <!-- ========== Phase 10 Lesson 对象与事件基础 ========== -->
  <script src="js/lessonModel.js"></script>
  <script src="js/lessonValidator.js"></script>
  <script src="js/lessonStorage.js"></script>
  <script src="js/lessonEvents.js"></script>

  <!-- ========== Phase 11 核心学习引擎（必须在 lessonActions 之前加载） ========== -->
  <script src="js/eventBus.js"></script>
  <script src="js/coreLearningEngine.js"></script>

  <!-- ========== Phase 10 Lesson 动作（依赖 CLE） ========== -->
  <script src="js/lessonActions.js"></script>

  <!-- ========== Phase 8.5 内容加载器 ========== -->
  <script src="js/contentLoader.js"></script>

  <!-- ========== Phase 5 Academy 页面逻辑 ========== -->
  <script src="js/academy.js"></script>

  <!-- ========== 路由与页面脚本 ========== -->
  <script src="js/router.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/learning.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/notes.js"></script>
  <script src="js/settings.js"></script>

  <!-- ========== Phase 3 学习核心模块 ========== -->
  <script src="js/summary.js"></script>
  <script src="js/practice.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/notebook.js"></script>
  <script src="js/completion.js"></script>
  <script src="js/lesson.js"></script>

  <!-- ========== 应用主入口 ========== -->
  <script src="js/app.js"></script>

  <!-- ========== Phase 8.5 初始化：自动加载或安装 AI 学习包 ========== -->
  <script>
    (async function() {
      window.LawAIApp = window.LawAIApp || {};
      if (!LawAIApp.ContentLoader) return;
      let pack = await LawAIApp.ContentLoader.fetchPack('academy_ai');
      if (!pack) {
        LawAIApp.ContentLoader.installDefaultAIPack();
        pack = LawAIApp.ContentLoader.loadFromLocalStorage('academy_ai');
      }
      if (pack) {
        const errors = LawAIApp.ContentLoader.validatePack(pack);
        if (errors.length > 0) {
          console.warn('Pack validation errors:', errors);
        } else {
          console.log('✅ AI Learning Pack loaded successfully.');
        }
      } else {
        console.warn('⚠️ Could not load AI Learning Pack.');
      }
    })();
  </script>
</body>
</html>
