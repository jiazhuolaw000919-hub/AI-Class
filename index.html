<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Law AI Academy</title>

  <!-- ========================= -->
  <!-- 加载所有 CSS -->
  <!-- ========================= -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/academy.css">
  <link rel="stylesheet" href="css/animation.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/learning.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/lesson.css">
  <link rel="stylesheet" href="css/notes.css">
  <link rel="stylesheet" href="css/calendar.css">
  <link rel="stylesheet" href="css/settings.css">

  <!-- ========================= -->
  <!-- 加载 JS -->
  <!-- ========================= -->
  <script src="js/loader.js"></script>
  
  <!-- 核心引擎 -->
  <script>
    // 等待 loader 完成后再加载其他
    document.addEventListener('DOMContentLoaded', function() {
      console.log('📄 DOM ready, booting system...');
      
      // 加载 SystemComposer
      const script1 = document.createElement('script');
      script1.src = 'js/systemComposer.js';
      document.head.appendChild(script1);
      
      script1.onload = function() {
        console.log('✅ SystemComposer loaded');
        
        // 加载 App
        const script2 = document.createElement('script');
        script2.src = 'js/app.js';
        document.head.appendChild(script2);
        
        script2.onload = function() {
          console.log('✅ App loaded, initializing...');
          
          // 初始化 SystemComposer
          if (window.LawAIApp?.SystemComposer) {
            window.LawAIApp.SystemComposer.init({});
          }
          
          // 显示 academy 页面内容
          loadAcademyPage();
        };
      };
    });
    
    function loadAcademyPage() {
      // 使用 fetch 加载 academy.html 的内容
      fetch('pages/academy.html')
        .then(response => {
          if (!response.ok) {
            throw new Error('Failed to load academy page');
          }
          return response.text();
        })
        .then(html => {
          // 提取 body 内容
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, 'text/html');
          
          // 获取 body 内的内容（排除 script 和 style）
          const bodyContent = doc.body.innerHTML;
          
          // 找到挂载点
          const root = document.getElementById('law-runtime-root');
          if (root) {
            // 保留原有的 systemComposerRoot 作为容器
            let container = document.getElementById('systemComposerRoot');
            if (!container) {
              container = document.createElement('div');
              container.id = 'systemComposerRoot';
              root.appendChild(container);
            }
            
            // 将 academy 内容放入容器
            container.innerHTML = bodyContent;
            
            // 重新执行页面中的脚本（如果有）
            const scripts = container.querySelectorAll('script');
            scripts.forEach(oldScript => {
              const newScript = document.createElement('script');
              newScript.textContent = oldScript.textContent;
              container.appendChild(newScript);
            });
            
            console.log('✅ Academy page loaded successfully!');
          }
        })
        .catch(err => {
          console.warn('⚠️ Failed to load academy page, using fallback:', err);
          // 如果加载失败，使用 SystemComposer 的默认渲染
          if (window.LawAIApp?.SystemComposer) {
            window.LawAIApp.SystemComposer._renderMainUI();
          }
        });
    }
  </script>

</head>
<body>
  <!-- 挂载点 -->
  <div id="law-runtime-root"></div>

  <!-- 加载提示 -->
  <div id="loading-placeholder" style="
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #0b1220;
    color: #94a3b8;
    font-family: 'Inter', -apple-system, sans-serif;
    text-align: center;
    padding: 20px;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 9999;
    pointer-events: none;
    transition: opacity 0.8s ease;
  ">
    <div style="font-size: 48px; margin-bottom: 16px;">🚀</div>
    <h2 style="color: white; font-weight: 600; margin: 0 0 8px 0;">Loading Law AI Academy</h2>
    <p style="margin: 0; font-size: 14px;">Preparing your learning environment...</p>
    <div style="
      margin-top: 24px;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(74,158,255,0.15);
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    "></div>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </div>

  <script>
    // 当页面加载完成后，隐藏 loading 占位
    document.addEventListener('COMPOSER_MOUNTED', function() {
      hideLoading();
    });
    
    // 备用：5秒后隐藏
    setTimeout(hideLoading, 5000);
    
    function hideLoading() {
      const placeholder = document.getElementById('loading-placeholder');
      if (placeholder) {
        placeholder.style.opacity = '0';
        setTimeout(function() {
          placeholder.style.display = 'none';
        }, 800);
      }
    }
  </script>

  <!-- 如果 JavaScript 被禁用 -->
  <noscript>
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#0b1220;color:white;text-align:center;padding:20px;">
      <h2>⚠️ JavaScript 未启用</h2>
      <p style="color:#94a3b8;">请启用 JavaScript 以使用 Law AI Academy</p>
    </div>
  </noscript>
</body>
</html>
