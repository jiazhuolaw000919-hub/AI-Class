<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Law AI Academy</title>

  <!-- 只加载核心文件 -->
  <script src="js/loader.js"></script>
  
  <!-- loader.js 会自动加载其他需要的文件 -->
  <script>
    // 启动加载器
    window.LawAIApp = window.LawAIApp || {};
    
    // 配置需要加载的模块列表
    window.LawAIApp.modules = [
      'systemComposer.js',
      'app.js',
      // 其他核心模块...
    ];
    
    // 使用 loader 加载
    if (window.Loader) {
      window.Loader.loadAll(window.LawAIApp.modules);
    }
  </script>

</head>
<body>
  <div id="law-runtime-root"></div>
</body>
</html>
