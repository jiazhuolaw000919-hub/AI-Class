  <!-- ========== Phase 8.5 初始化：自动加载或安装 AI 学习包 ========== -->
  <script>
    (async function() {
      window.LawAIApp = window.LawAIApp || {};
      if (!LawAIApp.ContentLoader) return;
      let pack = await LawAIApp.ContentLoader.fetchPack('academy_ai');
      if (!pack) {
        LawAIApp.ContentLoader.installDefaultAIPack();
        pack = LawAIApp.ContentLoader.loadFromLocalStorage('academy_ai');
      }
      if (pack) {
        const errors = LawAIApp.ContentLoader.validatePack(pack);
        if (errors.length > 0) {
          console.warn('Pack validation errors:', errors);
        } else {
          console.log('✅ AI Learning Pack loaded successfully.');
        }
      } else {
        console.warn('⚠️ Could not load AI Learning Pack.');
      }
    })();
  </script>

  <!-- ========== Phase 15 启动：检查解锁、应用主题 ========== -->
  <script>
    (function() {
      if (LawAIApp.UnlockEngine && LawAIApp.ThemeEngine) {
        LawAIApp.UnlockEngine.checkAll();
        const currentTheme = LawAIApp.StorageEngine.get('current_theme');
        if (currentTheme) LawAIApp.ThemeEngine.applyTheme(currentTheme);
        console.log('🎨 Phase 15 Identity & Universe Engine activated');
      }
    })();
  </script>

  <!-- ========== 🔥 稳定性补丁：根治事件循环，保证引擎只执行一次 ========== -->
  <script>
    (function stabilize() {
      if (!LawAIApp.ProgressEngine || !LawAIApp.EventBus) return;

      const originalComplete = LawAIApp.ProgressEngine.completeLesson;
      LawAIApp.ProgressEngine.completeLesson = function(lessonId) {
        originalComplete.call(this, lessonId);
      };

      LawAIApp.LessonEvents.onLessonCompleted = function(lessonId) {
        console.log('Event: Lesson ' + lessonId + ' completed (stabilized)');
        LawAIApp.ProgressEngine.completeLesson(lessonId);
      };

      const processedLessons = new Set();
      LawAIApp.EventBus.on('LessonCompleted', function(data) {
        const id = data.lessonId;
        if (!id || processedLessons.has(id)) return;
        processedLessons.add(id);

        if (LawAIApp.StreakEngine) LawAIApp.StreakEngine.updateStreak();
        if (LawAIApp.AchievementEngine) LawAIApp.AchievementEngine.checkAll();
        if (LawAIApp.ReviewQueue) LawAIApp.ReviewQueue.addLessonToReview(id);
        if (LawAIApp.SecondBrain) LawAIApp.SecondBrain.getEntry(id);
      });

      console.log('🔒 Event loop stabilized');
    })();
  </script>
