<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Law AI Academy</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/academy.css">
  <link rel="stylesheet" href="css/animation.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/learning.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/theme.css">

  <!-- 核心 JS -->
  <script src="js/loader.js"></script>
  <script src="js/systemComposer.js"></script>
  <script src="js/app.js"></script>

</head>
<body>
  <!-- 挂载点 -->
  <div id="law-runtime-root"></div>

  <!-- 直接加载 academy.html 的内容 -->
  <script>
    // 加载 academy 页面
    fetch('pages/academy.html')
      .then(response => response.text())
      .then(html => {
        // 提取 body 内容
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const content = doc.body.innerHTML;
        
        // 找到挂载点并插入
        const root = document.getElementById('law-runtime-root');
        if (root) {
          root.innerHTML = content;
        }
        
        // 触发页面加载完成事件
        document.dispatchEvent(new Event('DOMContentLoaded'));
      })
      .catch(err => {
        console.warn('Failed to load academy page, using fallback:', err);
        // 如果加载失败，显示 SystemComposer
        if (window.LawAIApp?.SystemComposer) {
          window.LawAIApp.SystemComposer.init({});
        }
      });
  </script>
</body>
</html>
