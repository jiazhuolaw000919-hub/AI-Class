<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Law AI Academy - Academy</title>
    <!-- 用绝对路径加载 CSS -->
    <link rel="stylesheet" href="/css/academy.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
    <div id="app"></div>

    <!-- ========================================== -->
    <!-- 直接用绝对路径加载核心 JS（绕过 loader）   -->
    <!-- ========================================== -->
    <script src="/js/storageEngine.js"></script>
    <script src="/js/eventBus.js"></script>
    <script src="/js/profileEngine.js"></script>
    <script src="/js/progressEngine.js"></script>
    <script src="/js/systemComposer.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/academyAIView.js"></script>
    <script src="/js/router.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 Academy page loaded');
            
            // 等待 SystemComposer 就绪
            function renderAcademy() {
                var app = document.getElementById('app');
                if (!app) return;
                
                if (window.LawAIApp?.Views?.AcademyAIView) {
                    app.innerHTML = '';
                    window.LawAIApp.Views.AcademyAIView.render(app);
                    console.log('✅ Academy rendered');
                } else {
                    console.warn('⚠️ AcademyAIView not ready, retrying...');
                    setTimeout(renderAcademy, 500);
                }
            }
            
            if (window.LawAIApp?.Views?.AcademyAIView) {
                var app = document.getElementById('app');
                if (app) {
                    app.innerHTML = '';
                    window.LawAIApp.Views.AcademyAIView.render(app);
                }
            } else {
                document.addEventListener('SYSTEM_READY', function() {
                    setTimeout(renderAcademy, 300);
                });
                setTimeout(renderAcademy, 3000);
            }
        });
    </script>
</body>
</html>
