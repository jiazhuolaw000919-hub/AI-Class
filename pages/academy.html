<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Law AI Academy - Academy</title>
    <link rel="stylesheet" href="/css/academy.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
    <!-- 渲染容器 -->
    <div id="app"></div>

    <!-- 加载核心 JS（使用绝对路径 /js/） -->
    <script src="/js/loader.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/academyAIView.js"></script>
    <script src="/js/router.js"></script>

    <script>
        // 等待 DOM 加载完成后渲染 Academy 页面
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 Academy page loaded');
            
            // 等待 LawAIApp 就绪
            function renderAcademy() {
                var app = document.getElementById('app');
                if (!app) return;
                
                if (window.LawAIApp?.Views?.AcademyAIView) {
                    app.innerHTML = '';
                    window.LawAIApp.Views.AcademyAIView.render(app);
                    console.log('✅ Academy rendered');
                } else {
                    console.warn('⚠️ AcademyAIView not ready, retrying...');
                    setTimeout(renderAcademy, 500);
                }
            }
            
            // 如果 AcademyAIView 已经存在，直接渲染
            if (window.LawAIApp?.Views?.AcademyAIView) {
                var app = document.getElementById('app');
                if (app) {
                    app.innerHTML = '';
                    window.LawAIApp.Views.AcademyAIView.render(app);
                }
            } else {
                // 监听 SYSTEM_READY 事件
                document.addEventListener('SYSTEM_READY', function() {
                    setTimeout(renderAcademy, 300);
                });
                
                // 备用：3秒后强制渲染
                setTimeout(renderAcademy, 3000);
            }
        });
    </script>
</body>
</html>
