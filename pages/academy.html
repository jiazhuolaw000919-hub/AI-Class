<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏛️ Academy | Law AI</title>
    <link rel="stylesheet" href="/css/academy.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/animation.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/learning.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <link rel="stylesheet" href="/css/theme.css">
    <style>
        body { margin: 0; background: #0b1220; color: #e2e8f0; font-family: 'Inter', -apple-system, sans-serif; }
        #app { min-height: 100vh; max-width: 1200px; margin: 0 auto; }
        .academy-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; color: #94a3b8; text-align: center; }
        .academy-loading .spinner { width: 40px; height: 40px; border: 3px solid rgba(74,158,255,0.15); border-top-color: #4a9eff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .back-header {
            padding: 12px 20px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .back-header a {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 13px;
            padding: 6px 14px;
            border-radius: 8px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.2s;
        }
        .back-header a:hover {
            background: rgba(255,255,255,0.08);
            color: #e2e8f0;
        }
        .back-header .separator {
            color: #64748b;
            font-size: 13px;
        }
        .back-header .title {
            color: #e2e8f0;
            font-size: 14px;
            font-weight: 500;
        }
        @media (max-width: 480px) {
            .back-header { padding: 8px 12px; flex-wrap: wrap; }
            .back-header a { font-size: 12px; padding: 4px 10px; }
            .back-header .title { font-size: 12px; }
        }
    </style>
</head>
<body>
    <!-- ========================================================== -->
    <!-- 🔙 固定返回栏（独立于 app，不依赖 router）                  -->
    <!-- ========================================================== -->
    <div class="back-header">
        <a href="/">
            <span style="font-size:16px;">←</span> 
            <span>Back to Dashboard</span>
        </a>
        <span class="separator">|</span>
        <span class="title">🏛️ Academy</span>
    </div>

    <div id="app"></div>

    <!-- ========================================================== -->
    <!-- 脚本加载                                                  -->
    <!-- ========================================================== -->
    <script src="/js/storageEngine.js"></script>
    <script src="/js/eventBus.js"></script>
    <script src="/js/profileEngine.js"></script>
    <script src="/js/progressEngine.js"></script>
    <script src="/js/systemComposer.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/academyAIView.js"></script>
    <script src="/js/router.js"></script>

    <script>
        (function() {
            console.log('📄 Academy page loaded (with back button)');

            function renderAcademy() {
                var app = document.getElementById('app');
                if (!app) return;

                if (window.LawAIApp?.Views?.AcademyAIView && 
                    typeof window.LawAIApp.Views.AcademyAIView.render === 'function') {
                    app.innerHTML = '';
                    window.LawAIApp.Views.AcademyAIView.render(app);
                    console.log('✅ Academy rendered via Views.AcademyAIView');
                    return;
                }

                if (window.LawAIApp?.AcademyAIView && 
                    typeof window.LawAIApp.AcademyAIView.render === 'function') {
                    app.innerHTML = '';
                    window.LawAIApp.AcademyAIView.render(app);
                    console.log('✅ Academy rendered via AcademyAIView');
                    return;
                }

                app.innerHTML = `
                    <div class="academy-loading">
                        <div class="spinner"></div>
                        <p>Loading Academy...</p>
                        <p style="font-size:12px;color:#64748b;margin-top:8px;">
                            <a href="/" style="color:#4a9eff;text-decoration:none;">← Back to Dashboard</a>
                        </p>
                    </div>
                `;
                console.warn('⚠️ AcademyAIView not ready, retrying...');
                setTimeout(renderAcademy, 500);
            }

            function waitForReady() {
                if (document.readyState === 'complete' || document.readyState === 'interactive') {
                    if (window.LawAIApp?.Views?.AcademyAIView || window.LawAIApp?.AcademyAIView) {
                        renderAcademy();
                    } else {
                        document.addEventListener('SYSTEM_READY', function() {
                            setTimeout(renderAcademy, 300);
                        });
                        setTimeout(renderAcademy, 3000);
                    }
                } else {
                    document.addEventListener('DOMContentLoaded', function() {
                        setTimeout(renderAcademy, 500);
                    });
                }
            }

            waitForReady();
        })();
    </script>
</body>
</html>
