<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 Lesson | Law AI</title>
    <link rel="stylesheet" href="/css/lesson.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <style>
        body { margin: 0; background: #0b1220; color: #e2e8f0; font-family: 'Inter', -apple-system, sans-serif; }
        #app { min-height: 100vh; padding: 20px; max-width: 1000px; margin: 0 auto; }
        .lesson-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; color: #94a3b8; text-align: center; }
        .lesson-loading .spinner { width: 40px; height: 40px; border: 3px solid rgba(74,158,255,0.15); border-top-color: #4a9eff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="app"></div>

    <!-- ========================================================== -->
    <!-- 手动加载核心 JS                                           -->
    <!-- ========================================================== -->
    <script src="/js/storageEngine.js"></script>
    <script src="/js/eventBus.js"></script>
    <script src="/js/profileEngine.js"></script>
    <script src="/js/progressEngine.js"></script>
    <script src="/js/systemComposer.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/views/lessonView.js"></script>
    <script src="/js/router.js"></script>

    <script>
        (function() {
            console.log('📄 Lesson page loaded (V5.0)');

            function getLessonIdFromURL() {
                var params = new URLSearchParams(window.location.search);
                var id = params.get('lessonId') || params.get('id') || params.get('day');
                if (id) return id;
                var path = window.location.pathname;
                var match = path.match(/lesson[\/-]?(day-?\d+)/i);
                return match ? match[1] : null;
            }

            var lessonId = getLessonIdFromURL() || 'day-1';
            console.log('📖 Loading lesson:', lessonId);

            function renderLesson() {
                var app = document.getElementById('app');
                if (!app) return;

                // 优先使用 Views.LessonView
                if (window.LawAIApp?.Views?.LessonView && 
                    typeof window.LawAIApp.Views.LessonView.render === 'function') {
                    app.innerHTML = '';
                    window.LawAIApp.Views.LessonView.render(lessonId, app);
                    console.log('✅ Lesson rendered via Views.LessonView');
                    return;
                }

                // 其次使用顶层 LessonView
                if (window.LawAIApp?.LessonView && 
                    typeof window.LawAIApp.LessonView.render === 'function') {
                    app.innerHTML = '';
                    window.LawAIApp.LessonView.render(lessonId, app);
                    console.log('✅ Lesson rendered via LessonView');
                    return;
                }

                // 未就绪：显示 loading
                app.innerHTML = `
                    <div class="lesson-loading">
                        <div class="spinner"></div>
                        <p>Loading lesson...</p>
                        <p style="font-size:12px;color:#64748b;">Lesson: ${lessonId}</p>
                    </div>
                `;
                console.warn('⚠️ LessonView not ready, retrying...');
                setTimeout(renderLesson, 500);
            }

            function waitForReady() {
                if (document.readyState === 'complete' || document.readyState === 'interactive') {
                    if (window.LawAIApp?.Views?.LessonView || window.LawAIApp?.LessonView) {
                        renderLesson();
                    } else {
                        document.addEventListener('SYSTEM_READY', function() {
                            setTimeout(renderLesson, 300);
                        });
                        setTimeout(renderLesson, 3000);
                    }
                } else {
                    document.addEventListener('DOMContentLoaded', function() {
                        setTimeout(renderLesson, 500);
                    });
                }
            }

            waitForReady();
        })();
    </script>
</body>
</html>
