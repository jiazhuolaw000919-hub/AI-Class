<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Law AI Academy - Lesson</title>
    <link rel="stylesheet" href="../css/lesson.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        body {
            margin: 0;
            background: #0b1220;
            color: #e2e8f0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        }
        #app {
            min-height: 100vh;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        /* Loading 占位 */
        .lesson-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            color: #94a3b8;
            text-align: center;
        }
        .lesson-loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(74,158,255,0.15);
            border-top-color: #4a9eff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- 渲染容器 -->
    <div id="app"></div>

    <!-- 加载核心 JS -->
    <script src="../js/loader.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/views/lessonView.js"></script>
    <script src="../js/router.js"></script>

    <script>
        // ============================================================
        //  Lesson 页面独立渲染逻辑
        // ============================================================
        (function() {
            console.log('📄 Lesson page loaded');

            // 获取 URL 参数中的 lessonId
            function getLessonIdFromURL() {
                var params = new URLSearchParams(window.location.search);
                var id = params.get('lessonId') || params.get('id') || params.get('day');
                if (id) return id;
                // 如果没有参数，从 URL 路径提取
                var path = window.location.pathname;
                var match = path.match(/lesson[\/-]?(day-?\d+)/i);
                if (match) return match[1];
                return null;
            }

            var lessonId = getLessonIdFromURL() || 'day-1';
            console.log('📖 Loading lesson:', lessonId);

            function renderLesson() {
                var app = document.getElementById('app');
                if (!app) {
                    console.warn('⚠️ #app not found');
                    return;
                }

                // 检查 LessonView 是否可用
                if (LawAIApp.Views?.LessonView && typeof LawAIApp.Views.LessonView.render === 'function') {
                    app.innerHTML = '';
                    LawAIApp.Views.LessonView.render(lessonId, app);
                    console.log('✅ Lesson rendered:', lessonId);
                } else if (LawAIApp.LessonView && typeof LawAIApp.LessonView.render === 'function') {
                    // 兼容旧版本
                    app.innerHTML = '';
                    LawAIApp.LessonView.render(lessonId, app);
                } else {
                    // 显示加载占位
                    app.innerHTML = `
                        <div class="lesson-loading">
                            <div class="spinner"></div>
                            <p>Loading lesson...</p>
                            <p style="font-size:12px;color:#64748b;">Lesson: ${lessonId}</p>
                        </div>
                    `;
                    // 重试
                    var retries = 0;
                    var maxRetries = 5;
                    var retryInterval = setInterval(function() {
                        retries++;
                        if (LawAIApp.Views?.LessonView && typeof LawAIApp.Views.LessonView.render === 'function') {
                            clearInterval(retryInterval);
                            app.innerHTML = '';
                            LawAIApp.Views.LessonView.render(lessonId, app);
                            console.log('✅ Lesson retry succeeded');
                        } else if (retries >= maxRetries) {
                            clearInterval(retryInterval);
                            console.warn('⚠️ LessonView not available after retries');
                            app.innerHTML = `
                                <div style="text-align:center;padding:40px;color:#94a3b8;">
                                    <h3>📖 Lesson Not Available</h3>
                                    <p>Lesson view is loading. Please refresh if empty.</p>
                                    <button onclick="location.reload()" style="margin-top:16px;padding:8px 24px;background:#4a9eff;border:none;border-radius:8px;color:white;cursor:pointer;">🔄 Refresh</button>
                                </div>
                            `;
                        }
                    }, 500);
                }
            }

            // 等待 DOM 和 SYSTEM_READY
            function waitForReady() {
                if (document.readyState === 'complete' || document.readyState === 'interactive') {
                    // 如果 LawAIApp 已就绪，直接渲染
                    if (window.LawAIApp?.SystemComposer?.initialized) {
                        renderLesson();
                    } else {
                        // 监听 SYSTEM_READY
                        document.addEventListener('SYSTEM_READY', function() {
                            setTimeout(renderLesson, 300);
                        });
                        // 备用：2秒后强制渲染
                        setTimeout(renderLesson, 2000);
                    }
                } else {
                    document.addEventListener('DOMContentLoaded', function() {
                        setTimeout(renderLesson, 500);
                    });
                }
            }

            waitForReady();
        })();
    </script>
</body>
</html>
