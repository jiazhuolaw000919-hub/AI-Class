<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 Lesson | Law AI</title>
    <link rel="stylesheet" href="/css/lesson.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/animation.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/learning.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <link rel="stylesheet" href="/css/theme.css">
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            background: #0b1220; 
            color: #e2e8f0; 
            font-family: 'Inter', -apple-system, sans-serif; 
        }
        #app { 
            min-height: 100vh; 
            padding: 20px 20px 90px; 
            max-width: 1000px; 
            margin: 0 auto; 
        }
        .lesson-loading { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 60vh; 
            color: #94a3b8; 
            text-align: center; 
        }
        .lesson-loading .spinner { 
            width: 40px; 
            height: 40px; 
            border: 3px solid rgba(74,158,255,0.15); 
            border-top-color: #4a9eff; 
            border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
            margin-bottom: 16px; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== 顶部 Header ===== */
        .lesson-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .lesson-header .left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .lesson-header .left .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            font-family: inherit;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03);
            color: #94a3b8;
        }
        .lesson-header .left .back-btn:hover {
            background: rgba(255,255,255,0.08);
            color: #e2e8f0;
        }
        .lesson-header .left .back-btn span { font-size: 16px; }

        .lesson-header .center {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.04);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .lesson-header .center .icon { font-size: 20px; }
        .lesson-header .center .day-label {
            font-size: 15px;
            font-weight: 600;
            color: #e2e8f0;
            letter-spacing: 0.3px;
        }
        .lesson-header .center .day-number {
            font-size: 18px;
            font-weight: 700;
            color: #4a9eff;
            background: rgba(74,158,255,0.12);
            padding: 2px 12px;
            border-radius: 20px;
        }

        .lesson-header .right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }
        .lesson-header .right .date {
            font-size: 14px;
            font-weight: 500;
            color: #e2e8f0;
        }
        .lesson-header .right .time {
            font-size: 12px;
            color: #64748b;
            font-variant-numeric: tabular-nums;
        }

        /* ===== 底部导航 ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(20,20,40,0.92);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex;
            justify-content: space-around;
            padding: 6px 0 12px;
            z-index: 100;
        }
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            color: #64748b;
            text-decoration: none;
            font-size: 9px;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s;
            padding: 2px 12px;
        }
        .bottom-nav a:hover { color: #94a3b8; }
        .bottom-nav a.active { color: #4a9eff; }
        .bottom-nav a span:first-child { font-size: 18px; }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            .lesson-header { flex-direction: column; align-items: stretch; gap: 10px; }
            .lesson-header .left { justify-content: flex-start; }
            .lesson-header .center { justify-content: center; padding: 6px 16px; }
            .lesson-header .center .day-number { font-size: 15px; padding: 0 10px; }
            .lesson-header .right { align-items: center; flex-direction: row; justify-content: space-between; width: 100%; }
            .lesson-header .right .date { font-size: 13px; }
            .lesson-header .right .time { font-size: 11px; }
        }
        @media (max-width: 400px) {
            .lesson-header .center .day-label { font-size: 13px; }
            .lesson-header .center .day-number { font-size: 13px; }
            .lesson-header .left .back-btn { font-size: 12px; padding: 6px 12px; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <!-- ========================================================== -->
    <!-- 底部导航（固定）                                           -->
    <!-- ========================================================== -->
    <nav class="bottom-nav">
        <a href="/" class="nav-item" data-tab="home">
            <span>🏠</span><span>Home</span>
        </a>
        <a href="/pages/academy.html" class="nav-item" data-tab="academy">
            <span>📚</span><span>Academy</span>
        </a>
        <a href="#" class="nav-item" data-tab="calendar">
            <span>📅</span><span>Calendar</span>
        </a>
        <a href="#" class="nav-item" data-tab="notes">
            <span>📝</span><span>Notes</span>
        </a>
        <a href="#" class="nav-item" data-tab="settings">
            <span>⚙️</span><span>Settings</span>
        </a>
    </nav>

    <!-- ========================================================== -->
    <!-- 脚本加载                                                  -->
    <!-- ========================================================== -->
    <script src="/js/storageEngine.js"></script>
    <script src="/js/eventBus.js"></script>
    <script src="/js/profileEngine.js"></script>
    <script src="/js/progressEngine.js"></script>
    <script src="/js/systemComposer.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/views/lessonView.js"></script>
    <script src="/js/router.js"></script>

    <script>
        (function() {
            console.log('📄 Lesson page loaded');

            // ==========================================================
            // 获取 Lesson ID
            // ==========================================================
            function getLessonIdFromURL() {
                var params = new URLSearchParams(window.location.search);
                var id = params.get('lessonId') || params.get('id') || params.get('day');
                if (id) return id;
                var path = window.location.pathname;
                var match = path.match(/lesson[\/-]?(day-?\d+)/i);
                return match ? match[1] : null;
            }

            var lessonId = getLessonIdFromURL() || 'day-1';
            // 提取纯数字
            var dayNumber = lessonId.replace('day-', '').replace('day', '');
            console.log('📖 Loading lesson:', lessonId, 'day:', dayNumber);

            // ==========================================================
            // 格式化日期时间
            // ==========================================================
            function getFormattedDateTime() {
                var now = new Date();
                var options = { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric',
                    weekday: 'short'
                };
                var dateStr = now.toLocaleDateString('en-US', options);
                var timeStr = now.toLocaleTimeString('en-US', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    hour12: true 
                });
                return { date: dateStr, time: timeStr };
            }

            // ==========================================================
            // 底部导航点击处理
            // ==========================================================
            function setupNav() {
                document.querySelectorAll('.nav-item').forEach(function(item) {
                    item.addEventListener('click', function(e) {
                        var tab = this.dataset.tab;
                        
                        if (tab === 'home') {
                            window.location.href = '/';
                            return;
                        }
                        if (tab === 'academy') {
                            window.location.href = '/pages/academy.html';
                            return;
                        }
                        
                        e.preventDefault();
                        var tabNames = {
                            'calendar': '📅 Calendar',
                            'notes': '📝 Notes',
                            'settings': '⚙️ Settings'
                        };
                        if (window.LawAIApp?.Toast && typeof LawAIApp.Toast.info === 'function') {
                            LawAIApp.Toast.info(tabNames[tab] + ' coming soon! 🚧');
                        } else {
                            alert(tabNames[tab] + ' coming soon! 🚧');
                        }
                    });
                });
            }

            // ==========================================================
            // 渲染 Lesson Header
            // ==========================================================
            function renderHeader() {
                var app = document.getElementById('app');
                if (!app) return;

                // 如果已经有 header，不重复添加
                if (document.getElementById('lesson-header')) return;

                var dateTime = getFormattedDateTime();

                var header = document.createElement('div');
                header.id = 'lesson-header';
                header.className = 'lesson-header';
                header.innerHTML = `
                    <div class="left">
                        <button class="back-btn" onclick="window.history.back()">
                            <span>←</span> Back
                        </button>
                    </div>
                    <div class="center">
                        <span class="icon">📖</span>
                        <span class="day-label">Day</span>
                        <span class="day-number">${dayNumber}</span>
                    </div>
                    <div class="right">
                        <span class="date">${dateTime.date}</span>
                        <span class="time">${dateTime.time}</span>
                    </div>
                `;

                // 插入到 #app 的第一个子元素位置
                app.insertBefore(header, app.firstChild);
                console.log('✅ Lesson header rendered');
            }

            // ==========================================================
            // 渲染 Lesson 内容
            // ==========================================================
            function renderLesson() {
                var app = document.getElementById('app');
                if (!app) return;

                // 清空 app
                app.innerHTML = '';

                // 先渲染 Header
                renderHeader();

                // 再渲染 Lesson 内容
                var contentContainer = document.createElement('div');
                contentContainer.id = 'lesson-content';
                app.appendChild(contentContainer);

                if (window.LawAIApp?.Views?.LessonView && 
                    typeof window.LawAIApp.Views.LessonView.render === 'function') {
                    window.LawAIApp.Views.LessonView.render(lessonId, contentContainer);
                    console.log('✅ Lesson rendered via Views.LessonView');
                    return;
                }

                if (window.LawAIApp?.LessonView && 
                    typeof window.LawAIApp.LessonView.render === 'function') {
                    window.LawAIApp.LessonView.render(lessonId, contentContainer);
                    console.log('✅ Lesson rendered via LessonView');
                    return;
                }

                // 如果视图还没加载
                contentContainer.innerHTML = `
                    <div class="lesson-loading">
                        <div class="spinner"></div>
                        <p>Loading lesson...</p>
                        <p style="font-size:12px;color:#64748b;">Lesson: ${lessonId}</p>
                    </div>
                `;
                console.warn('⚠️ LessonView not ready, retrying...');
                setTimeout(renderLesson, 500);
            }

            // ==========================================================
            // 等待就绪
            // ==========================================================
            function waitForReady() {
                if (document.readyState === 'complete' || document.readyState === 'interactive') {
                    setupNav();
                    if (window.LawAIApp?.Views?.LessonView || window.LawAIApp?.LessonView) {
                        renderLesson();
                    } else {
                        document.addEventListener('SYSTEM_READY', function() {
                            setTimeout(renderLesson, 300);
                        });
                        setTimeout(renderLesson, 3000);
                    }
                } else {
                    document.addEventListener('DOMContentLoaded', function() {
                        setupNav();
                        setTimeout(renderLesson, 500);
                    });
                }
            }

            waitForReady();
        })();
    </script>
</body>
</html>
